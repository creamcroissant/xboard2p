syntax = "proto3";

package agent.v1;

option go_package = "github.com/creamcroissant/xboard/pkg/pb/agent/v1;agentv1";

// CoreInfo describes a core type and its availability.
message CoreInfo {
  string type = 1;
  string version = 2;
  bool installed = 3;
  repeated string capabilities = 4;
}

// CoreInstance describes a running core instance on agent.
message CoreInstance {
  string id = 1;
  string core_type = 2;
  string status = 3;
  repeated int32 listen_ports = 4;
  string config_path = 5;
  string config_hash = 6;
  int32 pid = 7;
  int64 started_at = 8;
  string error = 9;
}

// Legacy synchronous RPC payloads are kept temporarily so transition-period code can compile,
// but they are no longer exposed as first-class RPCs on AgentService.
message GetCoresRequest {}

message GetCoresResponse {
  repeated CoreInfo cores = 1;
  repeated CoreInstance instances = 2;
}

message SwitchCoreRequest {
  string from_instance_id = 1;
  string to_core_type = 2;
  bytes config_json = 3;
  string switch_id = 4;
  repeated int32 listen_ports = 5;
  bool zero_downtime = 6;
}

message SwitchCoreResponse {
  bool success = 1;
  string new_instance_id = 2;
  string message = 3;
  string error = 4;
}

message InstallCoreRequest {
  string core_type = 1;
  string action = 2;
  string version = 3;
  string channel = 4;
  string flavor = 5;
  bool activate = 6;
  string request_id = 7;
}

message InstallCoreResponse {
  bool success = 1;
  bool changed = 2;
  string message = 3;
  string error = 4;
  string core_type = 5;
  string version = 6;
  string previous_version = 7;
  bool activated = 8;
  bool rolled_back = 9;
}

message CoreSnapshot {
  string type = 1;
  string version = 2;
  bool installed = 3;
  repeated string capabilities = 4;
}

message CreateCoreInstancePayload {
  string instance_id = 1;
  bytes config_json = 2;
  int64 config_template_id = 3;
}

message SwitchCorePayload {
  string from_instance_id = 1;
  string to_core_type = 2;
  bytes config_json = 3;
  string switch_id = 4;
  repeated int32 listen_ports = 5;
  bool zero_downtime = 6;
  int64 config_template_id = 7;
}

message InstallCorePayload {
  string action = 1;
  string version = 2;
  string channel = 3;
  string flavor = 4;
  bool activate = 5;
  string request_id = 6;
}

message EnsureCorePayload {
  string version = 1;
  string channel = 2;
  string flavor = 3;
}

message CoreOperation {
  string id = 1;
  int64 agent_host_id = 2;
  string operation_type = 3;
  string core_type = 4;
  string status = 5;
  bytes request_payload = 6;
  bytes result_payload = 7;
  string error_message = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
  int64 started_at = 11;
  int64 finished_at = 12;
}

message GetCoreOperationsRequest {
  repeated string statuses = 1;
  int32 limit = 2;
}

message GetCoreOperationsResponse {
  bool success = 1;
  repeated CoreOperation operations = 2;
}

message ReportCoreOperationRequest {
  string operation_id = 1;
  string status = 2;
  bytes result_payload = 3;
  string error_message = 4;
  int64 finished_at = 5;
}

message ReportCoreOperationResponse {
  bool success = 1;
  string message = 2;
}
